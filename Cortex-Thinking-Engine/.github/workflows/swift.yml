# ─────────────────────────────────────────────────────────
# CortexOS — Swift CI
# Build + test the SwiftPM package on macOS.
# Validates models, services, and API contract compliance.
# ─────────────────────────────────────────────────────────
name: Swift CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'CortexOSApp/**'
      - 'Tests/**'
      - 'Package.swift'
      - '.github/workflows/swift.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'CortexOSApp/**'
      - 'Tests/**'
      - 'Package.swift'
      - '.github/workflows/swift.yml'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build library
        run: swift build -v

      - name: Run tests
        run: swift test -v
