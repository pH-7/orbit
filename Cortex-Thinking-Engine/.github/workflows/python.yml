# ─────────────────────────────────────────────────────────
# CortexOS — Python CI
# Lint (ruff) + Security (bandit) + Unit tests (pytest)
# Runs on every push/PR touching Python or test files.
# ─────────────────────────────────────────────────────────
name: Python CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'cortex_core/**'
      - 'tests/**'
      - 'scripts/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'pytest.ini'
      - '.github/workflows/python.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'cortex_core/**'
      - 'tests/**'
      - 'scripts/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'pytest.ini'
      - '.github/workflows/python.yml'

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install tools
        run: pip install ruff bandit

      - name: Ruff lint
        run: ruff check cortex_core/ tests/ scripts/

      - name: Ruff format check
        run: ruff format --check cortex_core/ tests/ scripts/

      - name: Bandit security scan
        run: bandit -r cortex_core/ -ll -q

  test:
    name: Tests (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --junitxml=results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: results.xml
